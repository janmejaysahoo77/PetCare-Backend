server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: petcare-backend


  # ── Redis (Cloud) ─────────────────────────────────────────
  data:
    redis:
      host: redis-13213.crce281.ap-south-1-3.ec2.cloud.redislabs.com
      port: 13213
      username: default
      password: ZejKJDo2v8zHEgQ34NFnRNQOs6qPIZwr
      ssl:
        enabled: true

  # ── Kafka (Confluent Cloud) ───────────────────────────────
  kafka:
    bootstrap-servers: pkc-9q8rv.ap-south-2.aws.confluent.cloud:9092
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="AHIE5CV66HHSGRE2" password="cfltzHQnnuY61PVHLyN44dREjAQOOJ9WVIa3fwlPAzKwaZA37+0vUEgp/OTRTZ7A";
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: petcare-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.petcare.events

  # ── Servlet / Multipart ───────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

# ── Firebase ───────────────────────────────────────────────
firebase:
  service-account-path: classpath:firebase/service-account.json
  verify-token: false   # Set to true in production
  # firestore-emulator-host: localhost:8081

# ── Supabase Storage ───────────────────────────────────────
supabase:
  url: https://YOUR_PROJECT_ID.supabase.co
  service-key: YOUR_SUPABASE_SERVICE_KEY
  storage:
    bucket: petcare-media

# ── SpringDoc / Swagger ────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true

# ── Actuator ───────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ── Logging ────────────────────────────────────────────────
logging:
  level:
    com.petcare: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
